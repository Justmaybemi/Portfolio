<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JustMaybeMi | Portfolio</title>
  <meta name="description" content="Visual work, creative direction, and curated projects." />

  <!-- ✅ FIXED favicon -->
  <link rel="icon" type="image/png" href="./logo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(to bottom, #f5f2ee, #7B024D);
      color: #111;
    }

    /* 🔥 HEADER */
    header {
      position: relative;
      text-align: center;
      color: white;
      padding: 120px 20px 80px;
      overflow: hidden;
    }

    /* Background layer using logo */
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.6)),
        url("./logo.png") center/40% no-repeat;
      opacity: 0.25;
      z-index: 0;
    }

    .logo {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 5rem);
      margin: 0 0 12px;
      position: relative;
      z-index: 1;
    }

    .hero-subtext {
      max-width: 600px;
      margin: 0 auto 40px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* 🔥 BUTTONS */
    .hero-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .primary-link {
      background: white;
      color: #111;
      border: none;
      border-radius: 999px;
      padding: 16px 44px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 1.4px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    .primary-link:hover {
      transform: translateY(-2px) scale(1.03);
      background: #ffefe2;
    }

    .secondary-links {
      display: flex;
      gap: 14px;
    }

    .secondary-links button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 10px 20px;
      cursor: pointer;
      transition: 0.25s;
    }

    .secondary-links button:hover {
      background: rgba(255,255,255,0.2);
    }

    /* SECTIONS */
    section {
      display: none;
      max-width: 1000px;
      margin: auto;
      padding: 80px 20px;
    }

    section h2 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
    }

    section p {
      text-align: center;
      max-width: 600px;
      margin: 10px auto;
      color: #444;
    }

    /* PORTFOLIO IMAGES */
    .portfolio-page {
      width: 80%;
      display: block;
      margin: 30px auto;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.15);
      transition: 0.25s;
    }

    .portfolio-page:hover {
      transform: translateY(-4px);
    }

    /* ICON LINKS */
    .quick-links {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
    }

    .quick-links i {
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.25s;
    }

    .quick-links i:hover {
      color: #ff6600;
      transform: translateY(-3px);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    @media (max-width: 600px) {
      .portfolio-page { width: 95%; }
      .secondary-links { flex-direction: column; }
    }
  </style>
</head>

<body>

<header>
  <!-- ✅ Logo -->
  <img src="./logo.png" class="logo" alt="logo">

  <h1>JustMaybeMi</h1>
  <p class="hero-subtext">
    Visual work, creative direction, and curated projects.
  </p>

  <div class="hero-nav">
    <button class="primary-link" onclick="showSection('portfolio')">Portfolio</button>

    <div class="secondary-links">
      <button onclick="showSection('pricing')">Pricing</button>
      <button onclick="showSection('contact')">Contact</button>
    </div>
  </div>
</header>

<section id="portfolio">
  <h2>Portfolio</h2>

  <img src="./1.png" class="portfolio-page">
  <img src="./2.png" class="portfolio-page">
  <img src="./3.png" class="portfolio-page">

  <div class="quick-links">
    <i class="fa-solid fa-tag" onclick="showSection('pricing')"></i>
    <i class="fa-solid fa-envelope" onclick="showSection('contact')"></i>
  </div>
</section>

<section id="pricing">
  <h2>Pricing</h2>
  <p>Pricing is tailored to each project.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: olaitanferimi@gmail.com</p>
</section>

<footer>
  <p>© 2026 JustMaybeMi</p>
</footer>

<script>
function showSection(id) {
  document.querySelectorAll("section").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "block";
  window.scrollTo({ top: document.getElementById(id).offsetTop, behavior: 'smooth' });
}
</script>

</body>
</html>
