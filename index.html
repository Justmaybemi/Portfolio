<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Your Name | Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Your Name featuring creative work, writing, and visual projects."
    />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/logo.png" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name | Portfolio" />
    <meta
      property="og:description"
      content="Explore creative work, writing, and visual projects by Your Name."
    />
    <meta property="og:image" content="./images/cover-image.jpg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

<body style="font-family: Roboto, sans-serif; margin:0;">

  <!-- HEADER -->
  <header style="background:black; color:white; padding:40px; text-align:center;">
    <h1>Your Name</h1>
    <p>Portfolio</p>
  </header>

  <!-- ABOUT -->
  <section style="padding:40px;">
    <h2>About Me</h2>
    <p>
      Write what was on your first page here. Who you are, what you do, etc.
    </p>
  </section>

  <!-- SKILLS -->
  <section style="padding:40px; background:#f5f5f5;">
    <h2>Skills</h2>
    <p>
      List your skills from the PDF.
    </p>
  </section>

  <!-- PROJECTS -->
  <section style="padding:40px;">
    <h2>Projects</h2>
    <p>
      Describe your projects from the PDF.
    </p>
  </section>

  <!-- CONTACT -->
  <section style="padding:40px; background:#f5f5f5;">
    <h2>Contact</h2>
    <p>
      Email, socials, etc.
    </p>
  </section>

</body>
</html>
