<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Your Name | Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Your Name featuring creative work, writing, and visual projects."
    />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/logo.png" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name | Portfolio" />
    <meta
      property="og:description"
      content="Explore creative work, writing, and visual projects by Your Name."
    />
    <meta property="og:image" content="./images/cover-image.jpg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body style="font-family: Roboto, sans-serif; text-align: center; padding: 50px;">

    <h1>My Portfolio</h1>
    <p>Welcome to my site.</p>

    <!-- PDF Link -->
    <a 
      href="./Portfolio.pdf" 
      target="_blank"
      style="display:inline-block; margin-top:20px; padding:12px 18px; background:black; color:white; text-decoration:none; border-radius:6px;"
    >
      View My Portfolio (PDF)
    </a>

  </body>
</html>
