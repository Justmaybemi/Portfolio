<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustMaybeMi | Portfolio</title>
  <meta
    name="description"
    content="Portfolio of JustMaybeMi featuring creative work, writing, and visual projects."
  />
  <meta name="author" content="JustMaybeMi" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" type="image/png" href="./logo.png" />

  <!-- Brand fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: #222;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    /* HEADER */
    header {
      background: #111;
      color: white;
      padding: 100px 20px 50px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 20px;
      font-size: 3.2em;
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }

    header p {
      margin: 0 0 30px;
      font-size: 1.1em;
      font-weight: 500;
      letter-spacing: 0.4px;
    }

    /* NAVIGATION BUTTONS */
    nav {
      margin-top: 20px;
    }

    nav button {
      color: white;
      margin: 0 12px;
      font-weight: 600;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.65);
      border-radius: 6px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1em;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    nav button:hover {
      background: #ff6600;
      border-color: #ff6600;
      transform: translateY(-1px);
    }

    /* SECTIONS */
    section {
      padding: 70px 20px;
      max-width: 1000px;
      margin: 0 auto;
      display: none;
    }

    section h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.2em;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.5px;
    }

    /* PORTFOLIO IMAGES */
    img.portfolio-page {
      display: block;
      width: 80%;
      margin: 30px auto;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 20px;
      background: #111;
      color: white;
      font-size: 0.95em;
    }
  </style>
</head>

<body>

  <!-- HEADER + NAVIGATION -->
  <header>
    <h1>JustMaybeMi</h1>
    <p>Creative Portfolio</p>
    <nav>
      <button onclick="unlockPortfolio()">Portfolio</button>
      <button onclick="showSection('pricing')">Pricing Guide</button>
      <button onclick="showSection('contact')">Contact</button>
    </nav>
  </header>

  <!-- SECTIONS -->

  <section id="portfolio">
    <h2>Portfolio</h2>
    <img src="./1.png" alt="Portfolio Page 1" class="portfolio-page" />
    <img src="./2.png" alt="Portfolio Page 2" class="portfolio-page" />
    <img src="./3.png" alt="Portfolio Page 3" class="portfolio-page" />
    <img src="./4.png" alt="Portfolio Page 4" class="portfolio-page" />
    <img src="./5.png" alt="Portfolio Page 5" class="portfolio-page" />
    <img src="./6.png" alt="Portfolio Page 6" class="portfolio-page" />
    <img src="./7.png" alt="Portfolio Page 7" class="portfolio-page" />
    <img src="./8.png" alt="Portfolio Page 8" class="portfolio-page" />
  </section>

  <section id="pricing">
    <h2>Pricing Guide</h2>
    <p>List your pricing, services, or packages here.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: your.email@example.com</p>
    <p>LinkedIn / GitHub / Socials: Add your links here</p>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 JustMaybeMi. All rights reserved.</p>
  </footer>

  <!-- SCRIPT -->
  <script>
    const portfolioPassword = "justmaybe"; 

    function showSection(id) {
      const sections = document.querySelectorAll('section');
      sections.forEach(section => {
        section.style.display = 'none';
      });

      const selectedSection = document.getElementById(id);
      if (selectedSection) {
        selectedSection.style.display = 'block';
        selectedSection.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function unlockPortfolio() {
      const input = prompt("Enter access code to view portfolio:");

      if (input === portfolioPassword) {
        showSection('portfolio');
      } else if (input !== null) {
        alert("Incorrect code.");
      }
    }
  </script>

</body>
</html>
