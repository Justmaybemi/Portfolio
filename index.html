<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>Your Name | Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Your Name featuring creative work, writing, and visual projects."
    />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/logo.png" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name | Portfolio" />
    <meta
      property="og:description"
      content="Explore creative work, writing, and visual projects by Your Name."
    />
    <meta property="og:image" content="./images/cover-image.jpg" />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body s style="font-family: Roboto, sans-serif; margin: 0;">

  <header style="text-align:center; padding:40px; background:black; color:white;">
    <h1>My Portfolio</h1>
    <p>Welcome to my work</p>
  </header>

  <section style="padding:20px;">
    <h2 style="text-align:center;">My Portfolio</h2>

    <iframe 
      src="./Portfolio.pdf" 
      width="100%" 
      height="600px"
      style="border:none;"
    ></iframe>
  </section>

</body>
</html>
