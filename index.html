<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JustMaybeMi | Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(-45deg, #ffffff, #f4efe9, #7B024D, #ff8ac6);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      padding: 100px 20px;
    }

    .brand-home {
      cursor: pointer;
    }

    .logo {
      width: 60px;
      border-radius: 50%;
    }

    .site-title {
      font-size: 2.5rem;
      display: block;
      margin-top: 10px;
    }

    .primary-link {
      padding: 14px 30px;
      border-radius: 999px;
      border: none;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary-links button {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }

    .client-access {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      text-decoration: none;
      color: white;
      font-size: 0.8rem;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .client-access:hover {
      background: rgba(255,255,255,0.2);
    }

    section {
      display: none;
      padding: 40px 20px;
    }

    .portfolio-page {
      width: 80%;
      margin: 20px auto;
      border-radius: 10px;
    }

    .pricing-image {
      width: 80%;
      margin: 40px auto;
      border-radius: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<header id="home">
  <div class="brand-home" onclick="goHome(event)">
    <img src="logo.png" class="logo">
    <span class="site-title">JustMaybeMi</span>
  </div>

  <button class="primary-link" onclick="showSection('portfolio')">Portfolio</button>

  <div class="secondary-links">
    <button onclick="showSection('pricing')">Pricing</button>
    <button onclick="showSection('contact')">Book Now</button>
  </div>

  <a href="https://justmaybemi.github.io/Client-Gallery-/" target="_blank" class="client-access">
    Client Gallery
  </a>
</header>

<section id="portfolio">
  <img src="./1.png" class="portfolio-page">
  <img src="./2.png" class="portfolio-page">
</section>

<section id="pricing">
  <img src="pricing.png" alt="Pricing" class="pricing-image">
</section>

<section id="contact">
  <form id="bookingForm">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="Phone">

    <select name="shootType" required>
      <option value="">Select type</option>
      <option value="birthday">Birthday</option>
      <option value="portrait">Portrait</option>
      <option value="group">Group</option>
      <option value="headshots">Headshots</option>
    </select>

    <input type="date" name="sessionDate" required>
    <textarea name="message" placeholder="Details"></textarea>

    <button type="submit">Send Inquiry</button>
  </form>
</section>

<script>
  emailjs.init("-poOx7v3BbKaimYFg");

  function showSection(id) {
    document.querySelectorAll('section').forEach(section => {
      section.style.display = 'none';
    });
    document.getElementById(id).style.display = 'block';
  }

  function goHome(e) {
    e.preventDefault();
    document.querySelectorAll('section').forEach(section => {
      section.style.display = 'none';
    });
  }

  document.getElementById('bookingForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const templateParams = {
      name: formData.get('name'),
      email: formData.get('email'),
      phone: formData.get('phone'),
      shootType: formData.get('shootType'),
      sessionDate: formData.get('sessionDate'),
      message: formData.get('message')
    };

    emailjs.send("service_bgmuzzt", "template_cup8wvh", templateParams)
    .then(() => {
      alert("Booking sent!");
      this.reset();
    })
    .catch(err => {
      alert("Error sending.");
    });
  });
</script>

</body>
</html>
