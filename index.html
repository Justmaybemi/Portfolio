<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustMaybeMi | Portfolio</title>
  <meta name="description" content="Portfolio of JustMaybeMi featuring creative work, writing, and visual projects." />
  <meta name="author" content="JustMaybeMi" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Roboto', sans-serif; margin:0; color:#222; }
    html { scroll-behavior: smooth; }

    /* HEADER */
    header {
      background:#111;
      color:white;
      padding:100px 20px 50px 20px;
      text-align:center;
    }
    header h1 { margin:0 0 20px 0; font-size:3em; }
    header p { margin:0 0 30px 0; font-size:1.2em; }

    /* NAVIGATION BUTTONS */
    nav {
      margin-top:20px;
    }
    nav button {
      color:white;
      margin:0 15px;
      text-decoration:none;
      font-weight:700;
      background:#222;
      border:2px solid #fff;
      border-radius:5px;
      padding:10px 20px;
      cursor:pointer;
      font-size:1em;
      transition: all 0.3s;
    }
    nav button:hover { background:#ff6600; border-color:#ff6600; }

    /* SECTIONS */
    section {
      padding:70px 20px;
      max-width:1000px;
      margin:0 auto;
      display:none; /* hidden initially */
    }
    section:nth-child(even) { background:#f5f5f5; }
    section h2 { text-align:center; margin-bottom:40px; font-size:2em; }

    /* PORTFOLIO IMAGES */
    img.portfolio-page {
      display:block;
      width:80%;
      margin:30px auto;
      border-radius:10px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    /* FOOTER */
    footer { text-align:center; padding:40px 20px; background:#111; color:white; }
  </style>
</head>

<body>

  <!-- HEADER + NAVIGATION -->
  <header>
    <h1>JustMaybeMi</h1>
    <p>Creative Portfolio</p>
    <nav>
      <button onclick="showSection('portfolio')">Portfolio</button>
      <button onclick="showSection('pricing')">Pricing Guide</button>
      <button onclick="showSection('contact')">Contact</button>
    </nav>
  </header>

  <!-- SECTIONS (ALL HIDDEN INITIALLY) -->

  <section id="portfolio">
    <h2>Portfolio</h2>
    <img src="./1.png" alt="Portfolio Page 1" class="portfolio-page" />
    <img src="./2.png" alt="Portfolio Page 2" class="portfolio-page" />
    <img src="./3.png" alt="Portfolio Page 3" class="portfolio-page" />
    <!-- Add more images as needed -->
  </section>
 
  <section id="pricing">
    <h2>Pricing Guide</h2>
    <p>List your pricing, services, or packages here.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: your.email@example.com</p>
    <p>LinkedIn / GitHub / Socials: Add your links here</p>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 JustMaybeMi. All rights reserved.</p>
  </footer>

  <!-- SCRIPT TO SHOW SECTIONS -->
  <script>
    function showSection(id) {
      // Hide all sections first
      const sections = document.querySelectorAll('section');
      sections.forEach(s => s.style.display = 'none');

      // Show only clicked section
      const section = document.getElementById(id);
      if(section) {
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });
      }
    }
  </script>

</body>
</html>
