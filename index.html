<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustMaybeMi | Portfolio</title>

  <link rel="icon" type="image/png" href="./logo.png" />

  <!-- Better fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Manrope', sans-serif;
      color:#222;
    }

    html { scroll-behavior: smooth; }

    /* HEADER */
    header {
      position:relative;
      text-align:center;
      padding:120px 20px 70px;
      background:url('./header.jpg') center/cover no-repeat;
      color:white;
    }

    /* Overlay */
    header::before {
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
    }

    header h1,
    header nav {
      position:relative;
      z-index:1;
    }

    header h1 {
      font-family:'Playfair Display', serif;
      font-size:3.5em;
      margin-bottom:25px;
      letter-spacing:1px;
    }

    /* NAV (SUBHEADING STYLE) */
    nav {
      margin-top:10px;
    }

    nav button {
      background:none;
      border:none;
      color:white;
      font-size:1em;
      margin:0 18px;
      cursor:pointer;
      font-weight:600;
      letter-spacing:1px;
      opacity:0.8;
      transition:0.3s;
    }

    nav button:hover {
      opacity:1;
      text-decoration:underline;
    }

    /* SECTIONS */
    section {
      padding:70px 20px;
      max-width:1000px;
      margin:0 auto;
      display:none;
    }

    section h2 {
      text-align:center;
      font-family:'Playfair Display', serif;
      font-size:2.2em;
      margin-bottom:40px;
    }

    /* PORTFOLIO */
    img.portfolio-page {
      width:80%;
      margin:30px auto;
      display:block;
      border-radius:12px;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    img.portfolio-page:hover {
      transform:scale(1.02);
    }

    /* FOOTER */
    footer {
      text-align:center;
      padding:40px;
      background:#111;
      color:white;
    }
  </style>
</head>

<body>

<header>
  <h1>JustMaybeMi</h1>

  <nav>
    <button onclick="showSection('portfolio')">Portfolio</button>
    <button onclick="showSection('pricing')">Pricing</button>
    <button onclick="showSection('contact')">Contact</button>
  </nav>
</header>

<section id="portfolio">
  <h2>Portfolio</h2>
  <img src="./1.png" class="portfolio-page" />
  <img src="./2.png" class="portfolio-page" />
  <img src="./3.png" class="portfolio-page" />
  <img src="./4.png" class="portfolio-page" />
</section>

<section id="pricing">
  <h2>Pricing</h2>
  <p style="text-align:center;">Available upon request.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p style="text-align:center;">your.email@example.com</p>
</section>

<footer>
  <p>&copy; 2026 JustMaybeMi</p>
</footer>

<script>
  function showSection(id) {
    const sections = document.querySelectorAll('section');
    sections.forEach(s => s.style.display = 'none');

    const section = document.getElementById(id);
    if(section) {
      section.style.display = 'block';
      section.scrollIntoView({ behavior: 'smooth' });
    }
  }
</script>

</body>
</html>
