<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustMaybeMi Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: #111;
      min-height: 100vh;
      background: linear-gradient(-45deg, #ffffff, #f4efe9, #7B024D, #ff8ac6);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    header {
      text-align: center;
      padding: 120px 20px;
      color: white;
    }
    section {
      display: none;
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
      color: white;
    }
    button {
      padding: 14px 40px;
      border-radius: 999px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    form input, form select, form textarea {
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
    }
  </style>
</head>

<body>

<header id="home">
  <h1>JustMaybeMi</h1>
  <p>Professional photography for every moment.</p>
  <button onclick="showSection('contact')">Book Now</button>
</header>

<section id="contact">
  <h2>Book a Session</h2>

  <form id="bookingForm">
    <input name="name" placeholder="Full Name" required>
    <input name="email" type="email" placeholder="Email Address" required>
    <input name="phone" placeholder="Phone Number">

    <select name="shootType" required>
      <option value="">Photoshoot Type</option>
      <option value="Birthday">Birthday</option>
      <option value="Portrait">Portrait</option>
      <option value="Group">Group</option>
      <option value="Headshots">Headshots</option>
    </select>
